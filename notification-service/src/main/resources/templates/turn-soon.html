<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif;
            background: #f5f5f5; }
        .container { max-width: 600px; margin: 30px auto;
            background: #fff; border-radius: 10px;
            padding: 30px; }
        .alert { background: #fef3c7; border: 2px solid #f59e0b;
            padding: 20px; border-radius: 8px;
            text-align: center; }
        .ticket { font-size: 48px; font-weight: bold;
            color: #d97706; }
    </style>
</head>
<body>
<div class="container">
    <div class="alert">
        <p>🔔 دورك قريب!</p>
        <div class="ticket" th:text="${ticketNumber}"></div>
        <p>رقم تذكرتك</p>
        <p>متبقي تقريباً
            <strong th:text="${etaMinutes}"></strong>
            دقيقة
        </p>
    </div>
    <p>مرحباً <strong th:text="${userName}"></strong>،
        يرجى الاستعداد والتوجه إلى النافذة قريباً.</p>
</div>
</body>
</html>
