<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 600px; margin: 30px auto;
            background: #fff; border-radius: 10px;
            padding: 30px; }
        .header { background: #2563eb; color: #fff;
            padding: 20px; border-radius: 8px;
            text-align: center; }
        .details { background: #f0f7ff; padding: 20px;
            border-radius: 8px; margin: 20px 0; }
        .row { display: flex; justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0; }
        .footer { text-align: center; color: #64748b;
            font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>✅ تم تأكيد حجزك</h2>
    </div>
    <p>مرحباً <strong th:text="${userName}"></strong>،</p>
    <p>تم حجز موعدك بنجاح. إليك التفاصيل:</p>
    <div class="details">
        <div class="row">
            <span>المركز</span>
            <strong th:text="${centerName}"></strong>
        </div>
        <div class="row">
            <span>الخدمة</span>
            <strong th:text="${serviceType}"></strong>
        </div>
        <div class="row">
            <span>الموعد</span>
            <strong th:text="${scheduledAt}"></strong>
        </div>
    </div>
    <div class="footer">
        <p>Smart Queue System — نظام الطوابير الذكي</p>
    </div>
</div>
</body>
</html>
