<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif;
            background: #f5f5f5; }
        .container { max-width: 600px; margin: 30px auto;
            background: #fff; border-radius: 10px;
            padding: 30px; }
        .ticket-card { background: #eff6ff;
            border: 2px solid #3b82f6;
            padding: 30px; border-radius: 10px;
            text-align: center; }
        .ticket-number { font-size: 64px; font-weight: bold;
            color: #2563eb; }
    </style>
</head>
<body>
<div class="container">
    <div class="ticket-card">
        <p>🎫 تذكرتك</p>
        <div class="ticket-number"
             th:text="${ticketNumber}"></div>
        <p>وقت الانتظار المتوقع:
            <strong th:text="${etaMinutes}"></strong>
            دقيقة
        </p>
    </div>
    <p>مرحباً <strong th:text="${userName}"></strong>،
        انضممت للطابور بنجاح. سنخبرك عندما يقترب دورك.</p>
</div>
</body>
</html>
