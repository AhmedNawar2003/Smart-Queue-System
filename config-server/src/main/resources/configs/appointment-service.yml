server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/smart_queue_appointment_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: >
        org.apache.kafka.common.serialization.StringSerializer
      value-serializer: >
        org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: smartqueue-secret-key-egypt-2024-very-long-and-secure-key

management:
  tracing:
    sampling:
      probability: 1.0   # 100% من الـ requests
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    health:
      show-details: always
    web:
      exposure:
        include: health,info


logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs