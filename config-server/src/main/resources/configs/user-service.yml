server:
  port: 8082
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/smart_queue_user_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost

jwt:
  secret: smartqueue-secret-key-egypt-2024-very-long-and-secure-key

management:
  tracing:
    sampling:
      probability: 1.0   # 100% من الـ requests
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    health:
      show-details: always
    web:
      exposure:
        include: health,info


logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs