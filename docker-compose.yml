version: '3.9'

services:

  # ══════════════════════════════════════════════
  # INFRASTRUCTURE
  # ══════════════════════════════════════════════

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - smartqueue-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - smartqueue-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - smartqueue-network

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - smartqueue-network

  # ══════════════════════════════════════════════
  # DATABASES
  # ══════════════════════════════════════════════

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - smartqueue-network

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - smartqueue-network

  queue-db:
    image: postgres:16-alpine
    container_name: queue-db
    environment:
      POSTGRES_DB: queue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - queue_db_data:/var/lib/postgresql/data
    networks:
      - smartqueue-network

  appointment-db:
    image: postgres:16-alpine
    container_name: appointment-db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - appointment_db_data:/var/lib/postgresql/data
    networks:
      - smartqueue-network

  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - smartqueue-network

  analytics-db:
    image: postgres:16-alpine
    container_name: analytics-db
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    networks:
      - smartqueue-network

  # ══════════════════════════════════════════════
  # SPRING CLOUD INFRASTRUCTURE
  # ══════════════════════════════════════════════

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - smartqueue-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider",
             "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
    networks:
      - smartqueue-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider",
             "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: >
        optional:configserver:http://config-server:8888
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: >
        http://zipkin:9411/api/v2/spans
    networks:
      - smartqueue-network

  # ══════════════════════════════════════════════
  # BUSINESS SERVICES
  # ══════════════════════════════════════════════

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      auth-db:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: >
        optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: >
        jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: >
        http://zipkin:9411/api/v2/spans
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    networks:
      - smartqueue-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      user-db:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: >
        optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: >
        jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: >
        http://zipkin:9411/api/v2/spans
    networks:
      - smartqueue-network

  queue-service:
    build: ./queue-service
    container_name: queue-service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      queue-db:
        condition: service_started
      kafka:
        condition: service_started
      redis:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: >
        optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: >
        jdbc:postgresql://queue-db:5432/queue_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: >
        http://zipkin:9411/api/v2/spans
    networks:
      - smartqueue-network

  appointment-service:
    build: ./appointment-service
    container_name: appointment-service
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      appointment-db:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: >
        optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: >
        jdbc:postgresql://appointment-db:5432/appointment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: >
        http://zipkin:9411/api/v2/spans
    networks:
      - smartqueue-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      notification-db:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: >
        optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: >
        jdbc:postgresql://notification-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: >
        http://zipkin:9411/api/v2/spans
    networks:
      - smartqueue-network

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      analytics-db:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: >
        http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: >
        optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: >
        jdbc:postgresql://analytics-db:5432/analytics_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: >
        http://zipkin:9411/api/v2/spans
    networks:
      - smartqueue-network

# ══════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════

volumes:
  auth_db_data:
  user_db_data:
  queue_db_data:
  appointment_db_data:
  notification_db_data:
  analytics_db_data:

# ══════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════

networks:
  smartqueue-network:
    driver: bridge